name: Haftalık Macro Tarama

on:
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3 # Versiyonu güncelledik

      - name: Set up Python
        uses: actions/setup-python@v4 # BURASI DÜZELTİLDİ: os-actions değil actions
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests numpy

      - name: Haftalık Taramayı Çalıştır
        run: python haftalik_macro_tarama.py

      - name: Hafızayı Kaydet
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add haftalik_hafiza.json || echo "Dosya yok"
          git commit -m "Haftalık hafıza güncellendi" || echo "Değişiklik yok"
          git push
