name: Düşen Kırılım Tarayıcı

on:
  workflow_dispatch: # SADECE manuel çalıştırma butonunu aktif bıraktık (Saatli alarm silindi)

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Al
        uses: actions/checkout@v3
        
      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Gerekli Kütüphaneleri Yükle
        run: |
          pip install -r requirements.txt
          
      - name: Düşen Kırılım Taramasını Çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener.py
